$scripts = $HOME/.config/hypr/scripts
$configs = $HOME/.config/hypr/configs

$mainMod = SUPER

 # ╭───────────────────────────────────────────────────────────╮
 # │                     CORE APPLICATIONS                     │
 # ╰───────────────────────────────────────────────────────────╯
$terminal = kitty
$editor = nvim
$fileManager = dolphin
$browser = brave
$menu = pkill rofi || rofi -show drun -modi drun
$idle = hypridle

 # ╭───────────────────────────────────────────────────────────╮
 # │                     WINDOW Management                     │
 # ╰───────────────────────────────────────────────────────────╯
bind = , F4, exec, $scripts/hyprlock.sh launch
bind = , F11, fullscreen
bind = $mainMod Shift, F, togglefloating
bind = $mainMod, Q, killactive
bind = $mainMod Alt, F, pin
bind = Alt_R, Control_R, exec, pkill -USR1 waybar
bind = Control_R, Alt_R, exec, pkill waybar || waybar

 # ╭───────────────────────────────────────────────────────────╮
 # │                     GROUP Management                      │
 # ╰───────────────────────────────────────────────────────────╯
# bind = $mainMod, G, togglegroup
# bind = $mainMod Control, H, changegroupactive, b
# bind = $mainMod Control, L, changegroupactive, f
# bind = $mainMod Control, G, lockgroups, toggle

 # ╭───────────────────────────────────────────────────────────╮
 # │                       CHANGE FOCUS                        │
 # ╰───────────────────────────────────────────────────────────╯
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
# bind = ALT, Tab, cyclenext

 # ╭───────────────────────────────────────────────────────────╮
 # │                   ACTIVE WINDOW RESIZE                    │
 # ╰───────────────────────────────────────────────────────────╯
binde = $mainMod Shift, H, resizeactive, -30 0
binde = $mainMod Shift, J, resizeactive, 0 30
binde = $mainMod Shift, K, resizeactive, 0 -30
binde = $mainMod Shift, L, resizeactive, 30 0

 # ╭───────────────────────────────────────────────────────────╮
 # │                    MOVE ACTIVE WINDOW                     │
 # ╰───────────────────────────────────────────────────────────╯
binde = $mainMod Control, H, movewindow, l
binde = $mainMod Control, J, movewindow, d
binde = $mainMod Control, K, movewindow, u
binde = $mainMod Control, L, movewindow, r

 # ╭───────────────────────────────────────────────────────────╮
 # │                MOVE AND RESIZE WITH MOUSE                 │
 # ╰───────────────────────────────────────────────────────────╯
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

 # ╭───────────────────────────────────────────────────────────╮
 # │                           SPLIT                           │
 # ╰───────────────────────────────────────────────────────────╯
bind = Control Shift, M, layoutmsg, swapwithmaster child # not working for some reason

 # ╭───────────────────────────────────────────────────────────╮
 # │                         LAUNCHER                          │
 # ╰───────────────────────────────────────────────────────────╯
bindd = $mainMod, A, $d YT Music, exec, pear-desktop
bindd = $mainMod, B, $d Browser, exec, $browser
bindd = $mainMod, C, $d Notion Calendar, exec, notion-calendar-electron
bindd = $mainMod, D, $d OneNote, exec, $scripts/onenote_account.sh personal
bindd = $mainMod, E, $d Dolphin, exec, $fileManager
bindd = $mainMod, N, $d Notion, exec, notion-app
bindd = $mainMod, S, $d Spotify, exec, gtk-launch spotify-adblock
bindd = $mainMod, T, $d Terminal, exec, $terminal
bindd = $mainMod, W, $d OneNote, exec, $scripts/onenote_account.sh university
# bindd = ,XF86Launch1, $d PredatorSense , exec, DAMX

 # ╭───────────────────────────────────────────────────────────╮
 # │                           ROFI                            │
 # ╰───────────────────────────────────────────────────────────╯
bindd = , Menu, $d application finder , exec, pkill -x rofi || $menu

 # ╭───────────────────────────────────────────────────────────╮
 # │                     HARDWARE CONTROL                      │
 # ╰───────────────────────────────────────────────────────────╯
bindl  = , <F1>, exec, $scripts/hardware_control.sh mute
bindel = , <F2>, exec, $scripts/hardware_control.sh voldown
bindel = , <F3>, exec, $scripts/hardware_control.sh volup
bindl  = , XF86AudioMute, exec, $scripts/hardware_control.sh mute
bindl  = , XF86AudioMicMute, exec, $scripts/hardware_control.sh micmute
bindel = , XF86AudioLowerVolume, exec, $scripts/hardware_control.sh voldown
bindel = , XF86AudioRaiseVolume, exec, $scripts/hardware_control.sh volup

 # ╭───────────────────────────────────────────────────────────╮
 # │                         MEDIA KEY                         │
 # ╰───────────────────────────────────────────────────────────╯
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

 # ╭───────────────────────────────────────────────────────────╮
 # │                        BRIGHTNESS                         │
 # ╰───────────────────────────────────────────────────────────╯
bindel = , XF86MonBrightnessUp, exec, $scripts/hardware_control.sh brightup
bindel = , XF86MonBrightnessDown, exec, $scripts/hardware_control.sh brightdown

 # ╭───────────────────────────────────────────────────────────╮
 # │                     EYE CANDY TOGGLE                      │
 # ╰───────────────────────────────────────────────────────────╯
bindd = $mainMod Shift, A, $d game mode , exec, $scripts/eyecandyToggle.sh

 # ╭───────────────────────────────────────────────────────────╮
 # │                      SCREEN CAPTURE                       │
 # ╰───────────────────────────────────────────────────────────╯
bindl = , Print, exec, $scripts/screenshot_control.sh full
bindl = ALT, Print, exec, $scripts/screenshot_control.sh active
bindl = SHIFT, Print, exec, $scripts/screenshot_control.sh area
bindl = CTRL, Print, exec, $scripts/screenshot_control.sh annotate

# Wallpapers
bind = $mainMod SHIFT, W, exec, $scripts/wallpaper.sh # Select wallpaper to apply

# Launchers
bind = $mainMod ALT, R, exec, $scripts/refresh.sh # Refresh waybar, swaync, rofi
bind = $mainMod ALT, V, exec, $scripts/clipManager.sh # Clipboard Manager
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw # swayNC panel

# Hyprlock / Animations / Waybar / Bar related
bind = $mainMod ALT, A, exec, $scripts/hyprland-AnimationSelector.sh # Animations Select Menu
bind = $mainMod CTRL, B, exec,$scripts/waybar.sh style # Waybar Styles Menu
bind = $mainMod ALT, B, exec, $scripts/waybar.sh layout # Waybar Layout Menu
bind = $mainMod ALT, L, exec, $scripts/hyprlock.sh style # Hyprlock Styles Menu

 # ╭───────────────────────────────────────────────────────────╮
 # │                        WORKSPACES                         │
 # ╰───────────────────────────────────────────────────────────╯
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

 # ╭───────────────────────────────────────────────────────────╮
 # │                   WORKSPACE NAVIGATION                    │
 # ╰───────────────────────────────────────────────────────────╯
bind = , mouse:276, workspace, e+1
bind = , mouse:275, workspace, e-1
bind = Alt_L Shift, L, workspace, e+1
bind = Alt_L Shift, H, workspace, e-1
bind = Alt_L, L, workspace, r+1
bind = Alt_L, H, workspace, r-1
# bind = $mainMod Control Alt, Right, movetoworkspace, r+1
# bind = $mainMod Control Alt, Left, movetoworkspace, r-1
# bind = $mainMod Control, Down, workspace, empty # Jump to first empty workspace

 # ╭───────────────────────────────────────────────────────────╮
 # │                 WINDOW MOVE TO WORKSPACE                  │
 # ╰───────────────────────────────────────────────────────────╯
bind = $mainMod Shift, 1, movetoworkspace, 1
bind = $mainMod Shift, 2, movetoworkspace, 2
bind = $mainMod Shift, 3, movetoworkspace, 3
bind = $mainMod Shift, 4, movetoworkspace, 4
bind = $mainMod Shift, 5, movetoworkspace, 5
bind = $mainMod Shift, 6, movetoworkspace, 6
bind = $mainMod Shift, 7, movetoworkspace, 7
bind = $mainMod Shift, 8, movetoworkspace, 8
bind = $mainMod Shift, 9, movetoworkspace, 9
bind = $mainMod Shift, 0 , movetoworkspace, 10

 # ╭───────────────────────────────────────────────────────────╮
 # │             MOVE WINDOW SILENTLY TO WORKSPACE             │
 # ╰───────────────────────────────────────────────────────────╯
bind = $mainMod Control, 1, movetoworkspacesilent, 1
bind = $mainMod Control, 2, movetoworkspacesilent, 2
bind = $mainMod Control, 3, movetoworkspacesilent, 3
bind = $mainMod Control, 4, movetoworkspacesilent, 4
bind = $mainMod Control, 5, movetoworkspacesilent, 5
bind = $mainMod Control, 6, movetoworkspacesilent, 6
bind = $mainMod Control, 7, movetoworkspacesilent, 7
bind = $mainMod Control, 8, movetoworkspacesilent, 8
bind = $mainMod Control, 9, movetoworkspacesilent, 9
bind = $mainMod Control, 0, movetoworkspacesilent, 10


 # ╭───────────────────────────────────────────────────────────╮
 # │                     SPECIAL WORKSPACE                     │
 # ╰───────────────────────────────────────────────────────────╯
# $d  = special:notion
# $d = [$ws|Special Workspaces]
# $scratch_music = special:music
# $scratch_gen   = special:general
# bind = $mainMod, R, togglespecialworkspace, general
# bind = $mainMod SHIFT, S, movetoworkspace, $scratch_gen
# bind = $mainMod ALT, S, movetoworkspacesilent, $scratch_gen
# bind = $mainMod Shift, M, togglespecialworkspace, music
# bind = $mainMod Control, M, movetoworkspace, $scratch_music
# bind = $mainMod Alt_R, M, movetoworkspacesilent, $scratch_music
# bind = $mainMod, RETURN, exec, [workspace $scratch_gen] $TERMINAL --title scratchpad-term
# bind = $mainMod, M, exec, [workspace $scratch_music] spotify

 # ╭───────────────────────────────────────────────────────────╮
 # │                        MASTER KEY                         │
 # ╰───────────────────────────────────────────────────────────╯
bind = $mainMod Alt_L, F12, submap, clean
submap = clean
bind = $mainMod Menu, F12, submap, reset
bind = $mainMod, Q, killactive
bindd = $mainMod, T, $d Terminal, exec, $terminal
submap = reset
