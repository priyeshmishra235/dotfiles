source = $HOME/.cache/wal/colors-hyprland.conf

$resolve.font=SF Pro Display|https://font.download/dl/font/sf-pro-display.zip
$resolve.font=AlfaSlabOne|https://font.download/dl/font/alfa-slab-one.zip

# BACKGROUND
background {
    monitor =
    color = $color0
    path = $HOME/.current_wallpaper
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# INPUT FIELD
input-field {
    monitor =
    size = 190, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    fade_on_empty = true
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99"></span></i>
    hide_input = false
    position = 0, -170
    halign = center
    valign = center
    outer_color = $color0
    inner_color = $color0
    font_color = $color6
    check_color = $color6
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%I")"
    color = $color6
    shadow_passes = 3
    shadow_size = 2
    font_size = 100
    font_family = AlfaSlabOne
    position = 0, 100
    halign = center
    valign = center
}

# Minute-Time
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%M")"
    color = $color6
    font_size = 100
    font_family = AlfaSlabOne
    shadow_passes = 3
    shadow_size = 2
    position = 0, -20
    halign = center
    valign = center
}

# Day-Date-Month
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %b %A")"
    color = $color7
    shadow_passes = 3
    shadow_size = 1
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = 1%, -1%
    halign = left
    valign = top
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] $MPRIS_TEXT
    color = $color7
    shadow_passes = 3
    shadow_size = 1
    font_size = 14
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 20
    halign = center
    valign = bottom
}

image {
    monitor =
    path = $MPRIS_IMAGE
    size = 80
    rounding = -1
    border_size = 0
    shadow_passes = 3
    shadow_size = 3
    border_color = rgb(221, 221, 221)
    rotate = 0
    reload_time = 0
    position = 0, 10%
    halign = center
    valign = bottom
}

# Battery Status
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $color7
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}
