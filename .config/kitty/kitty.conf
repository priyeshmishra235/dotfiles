# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# allow_remote_control yes
# enable_graphics yes

shell tmux new-session -A -s default

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
enable_audio_bell no
font_size 8.0
cursor_trail 1

background_opacity 0.60
hide_window_decorations yes

include ~/.cache/wal/colors-kitty.conf
#confirm_os_window_close 0
# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no
